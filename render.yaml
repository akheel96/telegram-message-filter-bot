# Render deployment configuration
# NOTE: Background Worker (type: worker) requires a paid plan on Render ($7/month).
# See alternatives in CLOUDFLARE_SETUP.md for free hosting options.
# https://render.com/docs/blueprint-spec

services:
  - type: worker
    name: telegram-loot-filter-bot
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    autoDeploy: true
    envVars:
      # Required - Set these in the Render dashboard
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: SOURCE_CHANNEL_IDS
        sync: false
      - key: DESTINATION_CHANNEL_ID
        sync: false
      - key: SESSION_STRING
        sync: false

      # Optional
      - key: FILTER_KEYWORDS
        value: loot,deal,offer
      - key: SKIP_SITES_TEXT
        value: "ajio,ajiio"
      - key: LOG_LEVEL
        value: INFO
